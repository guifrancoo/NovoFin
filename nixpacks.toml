[phases.setup]
nixPkgs = ["nodejs_22", "cairo", "pango", "libpng", "libjpeg", "giflib", "librsvg", "pixman"]

[phases.install]
cmds = ["cd server && npm install", "cd client && npm install"]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "node --experimental-sqlite server/index.js"
